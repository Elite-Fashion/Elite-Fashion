name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        
    - name: Install Trunk
      uses: jetli/trunk-action@v0.4.0
      
    - name: Build
      run: |
        # Create production Trunk.toml with correct public_url
        cp Trunk.toml Trunk.prod.toml
        sed -i 's|public_url = "/"|public_url = "/Elite-Fashion/"|' Trunk.prod.toml
        trunk build --release --features production --config Trunk.prod.toml
      
    - name: Check dist folder
      run: |
        echo "=== DIST FOLDER CONTENTS ==="
        ls -la dist/
        echo "=== STATIC FOLDER CONTENTS ==="
        ls -la dist/static/
        echo "=== STATIC IMAGES ==="
        ls -la dist/static/images/
        echo "=== INDEX.HTML HEAD (first 50 lines) ==="
        head -50 dist/index.html
        echo "=== INDEX.HTML TAIL (last 20 lines) ==="
        tail -20 dist/index.html
        echo "=== CHECK IF JS FILES EXIST ==="
        ls -la dist/*.js
        echo "=== CHECK IF WASM FILES EXIST ==="
        ls -la dist/*.wasm
        echo "=== FILE SIZES ==="
        du -h dist/*
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        force_orphan: true
        
    - name: Test deployed site thoroughly
      run: |
        echo "=== TESTING DEPLOYED SITE ==="
        SITE_URL="https://elite-fashion.github.io/Elite-Fashion"
        
        # Test main page
        echo "Testing main page..."
        curl -s "$SITE_URL/" | head -10
        
        # Test shop routes
        echo "Testing /shop route..."
        curl -s "$SITE_URL/shop" | head -10
        
        echo "Testing /shop/dashboard route..."
        curl -s "$SITE_URL/shop/dashboard" | head -10
        
        echo "Testing /shop/profile route..."
        curl -s "$SITE_URL/shop/profile" | head -10
        
        # Test static assets
        echo "Testing JS files..."
        JS_FILE=$(curl -s "$SITE_URL/" | grep -o '/scrolling-website-[^"]*\.js' | head -1)
        if [ -n "$JS_FILE" ]; then
          echo "Found JS file: $JS_FILE"
          curl -s "$SITE_URL$JS_FILE" | head -5
        fi
        
        echo "Testing WASM files..."
        WASM_FILE=$(curl -s "$SITE_URL/" | grep -o '/scrolling-website-[^"]*\.wasm' | head -1)
        if [ -n "$WASM_FILE" ]; then
          echo "Found WASM file: $WASM_FILE"
          curl -s "$SITE_URL$WASM_FILE" | head -5
        fi
        
        # Test static images
        echo "Testing static assets..."
        curl -s "$SITE_URL/static/" | head -5 || echo "Static folder not accessible"
        
        # Check for 404 errors on main routes
        echo "Checking HTTP status codes..."
        for route in "/" "/shop" "/shop/dashboard" "/shop/profile"; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL$route")
          echo "Route $route: HTTP $STATUS"
        done
        
        # Check if WASM is properly referenced with correct path
        echo "Checking WASM path references..."
        curl -s "$SITE_URL/" | grep -o 'wasm[^"]*' | head -3
        
        echo "=== DEPLOYMENT TEST COMPLETE ==="
        
    - name: Test deployed site
      run: |
        echo "=== TESTING DEPLOYED SITE ==="
        curl -s https://elite-fashion.github.io/Elite-Fashion/ | head -20
