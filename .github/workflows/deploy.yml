name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        
    - name: Install Trunk
      uses: jetli/trunk-action@v0.4.0
      
    - name: Build
      run: trunk build --release --features production
      
    - name: Check dist folder
      run: |
        echo "=== DIST FOLDER CONTENTS ==="
        ls -la dist/
        echo "=== STATIC FOLDER CONTENTS ==="
        ls -la dist/static/
        echo "=== STATIC IMAGES ==="
        ls -la dist/static/images/
        echo "=== INDEX.HTML HEAD (first 50 lines) ==="
        head -50 dist/index.html
        echo "=== INDEX.HTML TAIL (last 20 lines) ==="
        tail -20 dist/index.html
        echo "=== CHECK IF JS FILES EXIST ==="
        ls -la dist/*.js
        echo "=== CHECK IF WASM FILES EXIST ==="
        ls -la dist/*.wasm
        echo "=== FILE SIZES ==="
        du -h dist/*
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        force_orphan: true
        
    - name: Test deployed site
      run: |
        echo "=== TESTING DEPLOYED SITE ==="
        curl -s https://elite-fashion.github.io/Elite-Fashion/ | head -20
